; pytest configuration — Van Gogh Living Scene
; Standards: NIST SA-11 (SEC-07 unit test coverage).

[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

; Default options:
;   -ra                    — show short summary for all except passed
;   --strict-markers       — undefined markers raise an error
;   --strict-config        — unknown config options raise an error
;   -q                     — quieter default output
addopts =
    -ra
    --strict-markers
    --strict-config
    -q

; Markers used across the suite.
markers =
    hardware: requires physical Pi hardware (IMX500 camera, Inky display) — skipped in CI
    integration: end-to-end pipeline test with mocked hardware
    slow: test takes > 1 second (skip with -m "not slow")
    security: validates a SEC-XX control from SECURITY-POLICY.md

; Log capture defaults — aids debugging failing tests in CI.
log_cli = False
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_cli_date_format = %Y-%m-%dT%H:%M:%S

; Warnings policy: treat DeprecationWarnings from our own code as errors.
filterwarnings =
    error::DeprecationWarning:src.*
    error::DeprecationWarning:tools.*
    ignore::DeprecationWarning
