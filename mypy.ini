; mypy configuration — Van Gogh Living Scene
; Enforces PEP 604 type hints on all function signatures (CLAUDE.md).
; Standards: NIST SA-11 (code quality), PEP 604.

[mypy]
python_version = 3.13
strict = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = True
warn_unreachable = True
no_implicit_optional = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
show_error_codes = True
pretty = True

; Exclude directories that are not type-checkable or are out of scope
exclude = (?x)(
    ^venv/
    | ^\.venv/
    | ^models/
    | ^assets/
    | ^build/
    )

; --- Third-party hardware/ML deps lack stubs on non-Pi platforms ---
; Treat missing imports as untyped to avoid CI failures off-target.

[mypy-picamera2.*]
ignore_missing_imports = True

[mypy-picamera2.devices.*]
ignore_missing_imports = True

[mypy-inky.*]
ignore_missing_imports = True

[mypy-rembg.*]
ignore_missing_imports = True

[mypy-ai_edge_litert.*]
ignore_missing_imports = True

[mypy-tflite_runtime.*]
ignore_missing_imports = True

[mypy-systemd.*]
ignore_missing_imports = True

[mypy-yaml]
ignore_missing_imports = True

; Tests may use untyped fixtures and mock objects
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
