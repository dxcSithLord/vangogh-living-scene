# Security workflow — Van Gogh Living Scene
# Runs static and supply-chain security checks on every push/PR.
# Standards: NIST SA-11 (developer security testing), OWASP A04/A05/A06.
#
# Initial rollout is report-only (continue-on-error). Once existing
# findings are triaged in scoped follow-up PRs, flip the flags to
# make this workflow blocking.

name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: bandit + pip-audit + yamllint + actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Bandit SAST
        id: bandit
        continue-on-error: true
        run: |
          bandit -c .bandit -r src tools \
            --severity-level medium --confidence-level medium \
            -f json -o bandit-report.json

      - name: Pip-audit dependency CVE scan
        id: pip-audit
        continue-on-error: true
        run: pip-audit -r requirements-ci.txt --format json --output pip-audit-report.json

      - name: Yamllint
        id: yamllint
        continue-on-error: true
        run: yamllint .

      - name: Install actionlint
        id: actionlint-install
        continue-on-error: true
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          set -euo pipefail
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          curl -fsSL -o "${tarball}" "${url}"
          echo "${ACTIONLINT_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "${tarball}" actionlint
          echo "path=$(pwd)/actionlint" >> "$GITHUB_OUTPUT"

      - name: Actionlint workflow check
        id: actionlint
        continue-on-error: true
        run: ${{ steps.actionlint-install.outputs.path }} -color

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Summarise security results
        if: always()
        run: |
          {
            echo "## Security results"
            echo ""
            echo "| Check | Outcome |"
            echo "|-------|---------|"
            echo "| bandit (SAST) | ${{ steps.bandit.outcome }} |"
            echo "| pip-audit (CVE) | ${{ steps.pip-audit.outcome }} |"
            echo "| yamllint | ${{ steps.yamllint.outcome }} |"
            echo "| actionlint | ${{ steps.actionlint.outcome }} |"
            echo ""
            echo "Report-only mode — see individual step logs and uploaded artefacts."
          } >> "$GITHUB_STEP_SUMMARY"
